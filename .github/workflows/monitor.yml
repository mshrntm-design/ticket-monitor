name: Ticket Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install selenium webdriver-manager

      - name: Install Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser

      - name: Run monitor
        timeout-minutes: 8
        env:
          TARGET_URL_YAHIDA_PIA_RESALE: ${{ secrets.TARGET_URL_YAHIDA_PIA_RESALE }}
          TARGET_URL_YAHIDA_LTIKE: ${{ secrets.TARGET_URL_YAHIDA_LTIKE }}
          TARGET_URL_YAHIDA_EPLUS: ${{ secrets.TARGET_URL_YAHIDA_EPLUS }}
          TARGET_URL_CHEMISTRY_PIA: ${{ secrets.TARGET_URL_CHEMISTRY_PIA }}
          TARGET_URL_CHEMISTRY_LTIKE: ${{ secrets.TARGET_URL_CHEMISTRY_LTIKE }}
          TARGET_URL_CHEMISTRY_EPLUS: ${{ secrets.TARGET_URL_CHEMISTRY_EPLUS }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        run: python monitor.py
